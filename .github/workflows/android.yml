name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'
        cache-disabled: true

    - name: Prepare Android SDK
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses
        "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "platform-tools" "platforms;android-34" "build-tools;34.0.0"

    - name: Build Debug APK
      id: gradle_build
      continue-on-error: true
      run: gradle --no-daemon assembleDebug --stacktrace --info --warning-mode all | tee build.log

    - name: Upload Gradle log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: gradle-build-log
        path: build.log

    - name: Fail if Gradle failed
      if: steps.gradle_build.outcome != 'success'
      run: exit 1

    - name: Modify APK Name
      if: steps.gradle_build.outcome == 'success'
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/MasjidTV-App.apk

    - name: Create Release
      if: steps.gradle_build.outcome == 'success'
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/MasjidTV-App.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
